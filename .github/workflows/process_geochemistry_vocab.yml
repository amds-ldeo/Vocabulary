# Processes the SKOS vocabularies under /geochemistry and publishes the
# generated HTML to the gh-pages branch under /docs/geochemistry.
#
# Triggered manually via the GitHub Actions "Run workflow" button.
#
# inputttl entries are ttl file basenames (no extension) under <vocabdir>.
# inputvocaburi entries are ConceptScheme CURIEs, one per file, in matching order.
# CURIEs must resolve via @prefix declarations inside the corresponding ttl file.

name: Process geochemistry vocabularies
on: [workflow_dispatch, workflow_call]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vocabulary action (geochemistry)
        uses: ./
        with:
          action: docs
          path: ${{ github.workspace }}
          vocabdir: geochemistry
          inputttl: GeochemAnalyticalMethod|onegctechniquesastromatv4
          inputvocaburi: meth:method|meth:method

      - name: Stage geochemistry output under docs/geochemistry
        run: |
          # The vocabulary action runs as root in its container; its outputs in
          # docs/ are root-owned. Re-own to the runner user so subsequent steps
          # (mv here, JamesIves deploy action) can touch them without sudo.
          sudo chown -R "$(id -u):$(id -g)" docs
          mkdir -p staged_docs/geochemistry
          shopt -s nullglob
          for f in docs/GeochemAnalyticalMethod* docs/onegctechniquesastromatv4*; do
            mv "$f" staged_docs/geochemistry/
          done
          ls -la staged_docs/geochemistry/

      - name: Deploy geochemistry docs to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: staged_docs/geochemistry
          target-folder: docs/geochemistry
          commit-message: "Rebuild geochemistry vocabulary HTML"
